<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNE | Ultra-Luxury Store</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* Global CSS Variables - Core Palette & Spacing */
        :root {
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-gold: #D4AF37;
            --accent-gold-hover: #F3E5AB;
            --border-subtle: #2A2A2A;
            
            --spacing-unit: 16px;
            --border-radius: 4px; 
            
            /* Responsive layout vars */
            --sidebar-width: 280px;
        }

        /* Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Typography & Branding --- */
        h1, h2, h3, .brand-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .brand-logo {
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .brand-logo .accent {
            color: var(--accent-gold);
        }

        /* --- Layout: Side Navigation (Desktop) --- */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: calc(var(--spacing-unit) * 2);
            z-index: 100;
        }

        #sidebar nav {
            margin-top: calc(var(--spacing-unit) * 3);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-unit);
        }

        #sidebar a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover, #sidebar a.active {
            color: var(--accent-gold);
        }

        /* --- Layout: Main Content Area --- */
        #main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            display: flex;
            flex-direction: column;
        }

        /* --- Header: Scroll-Responsive (Desktop & Mobile) --- */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-unit) calc(var(--spacing-unit) * 2);
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            transition: padding 0.3s ease, background-color 0.3s ease;
        }
        
        /* Mobile Hamburger Icon - Hidden on Desktop */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--accent-gold);
            cursor: pointer;
        }

        main {
            padding: calc(var(--spacing-unit) * 2);
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- Reusable Components --- */
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--border-radius);
            padding: calc(var(--spacing-unit) * 1.5);
            transition: transform 0.3s ease;
        }

        .btn-primary {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-unit);
            background-color: var(--accent-gold);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--border-radius);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            width: 100%;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-primary:hover {
            background-color: var(--accent-gold-hover);
        }

        /* --- Responsive Queries (Mobile) --- */
        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar.open {
                transform: translateX(0);
            }

            #main-content {
                margin-left: 0;
                width: 100%;
            }

            .mobile-menu-btn {
                display: block;
            }
            
            /* Mobile header branding visibility */
            header .brand-logo {
                display: block;
            }
            
            /* Enforce mobile-first inner content constraint */
            .card-container {
                max-width: 480px;
                margin: 0 auto;
            }
        }
        
        /* Desktop header branding hiding (since it's in the sidebar) */
        @media (min-width: 769px) {
            header .brand-logo {
                display: none; 
            }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="brand-logo">ZY<span class="accent">NE</span></div>
        <nav>
            <a href="#" class="active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Dashboard
            </a>
            <a href="#">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                Store
            </a>
        </nav>
    </aside>

    <div id="main-content">
        
        <header>
            <button class="mobile-menu-btn" aria-label="Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="brand-logo" style="display:none;">ZY<span class="accent">NE</span></div>
            
            <div class="header-actions">
                <button style="background:none;border:none;color:var(--text-primary);cursor:pointer;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
            </div>
        </header>

        <main>
            <div class="card-container">
                <div class="card">
                    <h2 style="margin-bottom: 16px;">Global Foundation Synchronized</h2>
                    <p style="margin-bottom: 24px; color: var(--text-secondary);">
                        The responsive architecture is now active. Desktop layouts feature the fixed side navigation, while the layout scales smoothly to the mobile view. Typography, spacing, sharp radii, and the core palette are strictly enforced.
                    </p>
                    <button class="btn-primary">Ready for Data Integration</button>
                </div>
            </div>
        </main>
        
    </div>

    <script>
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.style.padding = '8px 32px';
                header.style.backgroundColor = 'rgba(0, 0, 0, 0.95)';
            } else {
                header.style.padding = '16px 32px';
                header.style.backgroundColor = 'rgba(0, 0, 0, 0.85)';
            }
        });
        
        const menuBtn = document.querySelector('.mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        
        if(menuBtn && sidebar) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
